<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arunabha Das | Legal & Creative Services</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .bg-legal-navy { background-color: #0f172a; }
        .animate-fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 1. Navbar Component
        const Navbar = () => (
            <nav className="fixed top-0 w-full z-50 bg-legal-navy/80 backdrop-blur-md border-b border-white/10 px-6 py-4 flex justify-between items-center">
                <div className="flex items-center gap-2 font-bold text-xl tracking-tighter">
                    <i className="fas fa-gavel text-yellow-500"></i> ArunabhaDas
                </div>
                <div className="hidden md:flex gap-8 text-sm font-medium text-gray-400">
                    <a href="#about" className="hover:text-white transition-colors">About</a>
                    <a href="#services" className="hover:text-white transition-colors">Services</a>
                    <a href="#blog" className="hover:text-white transition-colors">Blog</a>
                    <a href="#contact" className="hover:text-white transition-colors">Contact</a>
                </div>
            </nav>
        );

        // 2. Hero Component
        const Hero = () => (
            <section className="pt-32 pb-20 px-6 text-center animate-fade-in">
                <h1 className="text-5xl md:text-7xl font-bold mb-6 tracking-tight">
                    Bridging Law & <span className="text-yellow-500">Creativity.</span>
                </h1>
                <p className="max-w-2xl mx-auto text-gray-400 text-lg md:text-xl leading-relaxed">
                    Legal Assistant, Content Creator, and Aspiring Developer. Providing professional legal drafting and high-impact creative solutions.
                </p>
            </section>
        );

        // 3. About Component
        const About = () => (
            <section id="about" className="py-20 px-6 max-w-4xl mx-auto">
                <div className="bg-white/5 border border-white/10 rounded-3xl p-8 md:p-12">
                    <h2 className="text-3xl font-bold mb-6">About Me</h2>
                    <p className="text-gray-400 leading-relaxed mb-6">
                        I am a 2nd-year Law student and B.Sc student based in Bally, West Bengal. My journey is fueled by a passion for justice and a drive for digital innovation. Whether I'm researching Constitutional Law or editing high-quality video content, I strive for excellence in every detail.
                    </p>
                    <div className="flex flex-wrap gap-4">
                        {['Legal Research', 'Video Editing', 'Content Creation', 'Creative Writing'].map(skill => (
                            <span key={skill} className="px-4 py-2 bg-yellow-500/10 text-yellow-500 border border-yellow-500/20 rounded-full text-sm font-medium">
                                {skill}
                            </span>
                        ))}
                    </div>
                </div>
            </section>
        );

        // 4. Services Component
        const Services = () => {
            const items = [
                { icon: 'fa-file-contract', title: 'Legal Drafting', desc: 'Precise drafting of contracts, legal notices, and research papers.' },
                { icon: 'fa-video', title: 'Video Editing', desc: 'Professional post-production for social media and business content.' },
                { icon: 'fa-pen-nib', title: 'Creative Writing', desc: 'Persuasive copy and engaging articles for various platforms.' }
            ];
            return (
                <section id="services" className="py-20 px-6 bg-white/5">
                    <div className="max-w-6xl mx-auto grid md:grid-cols-3 gap-8">
                        {items.map(s => (
                            <div key={s.title} className="p-8 border border-white/10 rounded-2xl hover:border-yellow-500/50 transition-all group">
                                <i className={`fas ${s.icon} text-3xl text-yellow-500 mb-6 group-hover:scale-110 transition-transform`}></i>
                                <h3 className="text-xl font-bold mb-4">{s.title}</h3>
                                <p className="text-gray-400 text-sm leading-relaxed">{s.desc}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        // 5. Blog Component (Simplified version for the demo)
        const Blog = () => (
            <section id="blog" className="py-20 px-6 max-w-4xl mx-auto text-center">
                <h2 className="text-3xl font-bold mb-10">Insights & Thoughts</h2>
                <div className="p-12 border-2 border-dashed border-white/10 rounded-3xl">
                    <i className="far fa-newspaper text-4xl text-gray-700 mb-4"></i>
                    <p className="text-gray-500 italic">No articles published yet. Check back soon for legal and creative insights!</p>
                </div>
            </section>
        );

        // 6. Contact Component
        const Contact = () => (
            <section id="contact" className="py-24 bg-legal-navy text-white text-center">
                <div className="max-w-3xl mx-auto px-6">
                    <i className="fas fa-envelope-open-text text-5xl text-yellow-500 mb-6"></i>
                    <h2 className="text-4xl md:text-5xl font-bold mb-4 font-serif">Get in Touch</h2>
                    <p className="text-xl text-gray-300 mb-10 font-light">
                        Whether you need a contract drafted, your accounts managed, or a video edited, I am ready to assist you.
                    </p>
                    <div className="bg-white/10 p-10 rounded-2xl backdrop-blur-md inline-block border border-white/20 shadow-2xl">
                        <p className="text-gray-300 text-sm uppercase tracking-widest font-semibold">Direct Email Address</p>
                        <a href="mailto:abhipages@gmail.com" className="text-2xl md:text-4xl font-bold text-yellow-400 hover:text-white transition-colors duration-300 break-all">
                            abhipages@gmail.com
                        </a>
                    </div>
                </div>
            </section>
        );

        // 7. Footer Component (Includes the fixed Visitor Counter)
        const Footer = () => (
            <footer className="bg-gray-900 text-gray-400 py-12 text-center border-t border-white/5">
                <div className="mb-6">
                    <i className="fas fa-balance-scale text-3xl text-gray-600"></i>
                </div>
                <p className="font-semibold text-white">&copy; 2026 Arunabha Das. All Rights Reserved.</p>
                <p className="mt-2 text-sm">Legal Assistant | Freelancer | Student</p>
                
                {/* Fixed Visitor Counter Integration */}
                <div className="mt-10 flex flex-col items-center gap-3">
                    <p className="text-xs uppercase tracking-[0.2em] text-gray-500">Total Visitors</p>
                    <img 
                        src="https://komarev.com/ghpvc/?username=Arunabhadas2006&color=4ade80&style=flat-square&label=VISITORS" 
                        alt="Visitor Count" 
                        className="rounded-sm opacity-80 hover:opacity-100 transition-opacity"
                    />
                </div>
            </footer>
        );

        // Main App Component
        const App = () => (
            <div className="animate-fade-in selection:bg-yellow-500 selection:text-blue-900">
                <Navbar />
                <Hero />
                <About />
                <Services />
                <Blog />
                <Contact />
                <Footer />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
